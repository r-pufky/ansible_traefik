---
###############################################################################
# Feature Flags
###############################################################################

# 1. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions.
#
# Default: True.
traefik_flg_maintenance: true

# 2. Install application?
#
# Creates required default directories, users, install packages, download
# software, autogenerates dashboard config if not specified, update and start
# services.
#
# Default: True.
traefik_flg_install: true

# 3. Set configuration data?
#
# Overwrite /etc/opt/traefik config directory sourced from traefik_cfg_d. Stops
# service, deploys user config data, updates and starts services.
#
# Default: False.
traefik_flg_config: false

###############################################################################
# Service
###############################################################################

# Traefik Release.
#
# Versions (Schematic):
#       MAJOR: Safe - Usually requires no role updates.
#       MINOR: Safe - Usually requires no role updates.
#       PATCH: Safe - Usually requires no role updates.
#   RECOMMEND: Always check release notes when upgrading versions - custom
#              configuration files may break though role will likely not.
#
# Default: 'v3.6.13'.
#
# Reference:
# * https://doc.traefik.io/traefik/deprecation/releases
traefik_srv_version: 'v3.6.13'

# Github access token (traefik).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
traefik_srv_token: ''

# Enable running service as traefik_srv_user?
#
# Traefik runs as root by default to access privileged ports.
#
# Service always hardened with systemd:
# * ProtectHome
# * ProtectSystem
# * PrivateTmp
# * PrivateDevices
# * ProtectKernelTunables
# * ProtectKernelModules
# * ReadWritePaths=/var/opt/traefik
# * AmbientCapabilities=CAP_NET_BIND_SERVICE
#
# Values:
#    True: Run as traefik_srv_user - CAP_NET_BIND_SERVICE required for binding
#          on ports <1024. Run in isolated VM/container. Highly Recommended.
#   False: Run as root - Always run in isolated VM/container. Not recommended.
#
# Default: True.
traefik_srv_run_as_user: true

# User that Traefik will run under.
#
# 'traefik' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'traefik'.
traefik_srv_user: 'traefik'

# Group that Traefik will run under.
#
# 'traefik' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'traefik'.
traefik_srv_group: 'traefik'

# Enable service restart?
#
# Traefik requires restarts for startup configuration changes.
#
# Values:
#    True: Traefik is 'restarted' after role configuration is completed. May
#          lead to service interruptions - startup configuration reloaded.
#   False: Traefik is 'started' after role configuration is completed - startup
#          configuration changes will NOT be picked up.
#
# Default: True.
traefik_srv_restart: true

###############################################################################
# Config
###############################################################################

# Traefik Environment.
#
# Set environment variables for Traefik service. Especially useful for setting
# lego configuration for let's encrypt certificates on bare metal.
#
# traefik_cfg_env:
#     list of dict - Environment variables to set.
#   - var: str - Environment variable name.
#     value: str - Environment variable value.
#
# traefik_cfg_env:
#   - var: 'GCE_PROJECT'
#     value: 'my-project-id-123456789'
#   - var: 'GCE_SERVICE_ACCOUNT_FILE'
#     value: '/etc/opt/traefik/gcloud_dns.json'  # Use traefik_cfg_d.
#
# Default: [] (disabled).
traefik_cfg_env: []

# Traefik configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2
# templates allowing for ansible variable use).
#
# Sets data in /etc/opt/traefik/*. Files not sourced will be removed.
#
# traefik_flg_config=true:
# ⋮traefik_srv_conf_d='' - Remove existing files.
# ⋮traefik_srv_conf_d='{DIR}' - Replace existing files with sourced template
# ⋮    dir.
# traefik_flg_config=false:
# ⋮traefik_srv_conf_d=* - Use default traefik configuration template dir in
# ⋮    templates/default.
#
# Special Case:
# * traefik.{toml,yml} startup configuration automatically selected for systemd
#   service. YAML is used if both exist.
# * Service credential files should be placed here.
# * Traefik daemon restricted to read/write on /var/opt/traefik. Write state
#   (e.g. ACME certificate state) data in /var/opt/traefik in settings.
#
# traefik_cfg_d: 'host_vars/traefik.example.com/conf.d'
#
# Default: '' (use minimally configured default).
traefik_cfg_d: ''
